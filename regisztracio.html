    <main id="wrapper">
        <section id="content">
            <h2>Regisztráció</h2>
            <p>Kérjük, töltse ki az adatokat a regisztrációhoz!</p>
            
            <form id="reg-form">
                <p>
                    <label for="vezeteknev">Családi név:</label>
                    <input type="text" id="vezeteknev" name="vezeteknev" required>
                </p>
                
                <p>
                    <label for="utonev">Utónév:</label>
                    <input type="text" id="utonev" name="utonev" required>
                </p>
                
                <p>
                    <label for="login_nev">Login név:</label>
                    <input type="text" id="login_nev" name="login_nev" required>
                </p>
                
                <p>
                    <label for="email">E-mail cím:</label>
                    <input type="email" id="email" name="email" placeholder="pelda@email.com" required>
                </p>
                
                <p>
                    <label for="reg-pw">Jelszó (min. 6 karakter, betű és szám):</label>
                    <input type="password" id="reg-pw" 
                           pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$" 
                           title="A jelszónak legalább 6 karakternek kell lennie, és tartalmaznia kell betűt és számot is!" 
                           required>
                </p>
                
                <button type="submit">Regisztráció</button>
            </form>
            
            <div id="reg-uzenet" style="margin-top: 20px;"></div>
        </section>
    </main>

    <footer>
        <p>Kiss Ferenc: RYRW9B, Börönte István: YA6TJF</p>
    </footer>

    <script>
        // Ez a kis rész hívja meg a script.js-ben lévő regisztrációs függvényt
        document.getElementById('reg-form').onsubmit = function(e) {
            e.preventDefault(); // Megakadályozza az oldal azonnali újratöltését
            regisztracioSzimulacio();
        };
    </script>
</body>
