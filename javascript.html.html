<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <title>JavaScript CRUD beadandó</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
	<h1><center>JavaScript CRUD beadandó</center></h1>
	<hr>
	<div class="employee-form">
		<form onsubmit="event.preventDefault();onFormSubmit();">
			<div>
				<label>Frekvencia*</label><label class="validation-error hide" id="FrekvenciaValidationError">This field is required.</label>
				<input type="number" name="Frekvencia" id="Frekvencia" step="any" min="0" max="500">
			</div>
			<div>
				<label>teljesitmeny</label>
				<input type="text" name="teljesitmeny" id="teljesitmeny">
			</div>
			<div>
				<label>csatorna</label>
				<input type="text" name="csatorna" id="csatorna">
			</div>
			<div>
				<label>adohely</label>
				<input type="text" name="adohely" id="adohely">
			</div>
			<div  class="form-action-buttons">
				<input type="submit" value="Submit">
			</div>
		</form>
	</div>
	<br/>
	<div class = "employees-table">
		<table class="list" id="employeeList">
			<thead>
				<tr>
					<th>Frekvencia</th>
					<th>teljesitmeny Id</th>
					<th>csatorna</th>
					<th>adohely</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody>

			</tbody>
		</table>
	</div>
    <script src="script.js"></script>
</body>
</html>
